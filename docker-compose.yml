      RAPHAEL_NOTIFICATIONS_URL: http://raphael-notifications:8090
      RAPHAEL_WORKSPACES_URL: http://raphael-workspaces:8083
      RAPHAEL_DATABASE_URL: postgresql://raphael:raphael@postgres:5432/raphael
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  raphael-automation:
    build:
