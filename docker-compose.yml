services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: raphael
      POSTGRES_PASSWORD: raphael
      POSTGRES_DB: raphael
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raphael"]
      interval: 5s
      timeout: 5s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:v24.2.4
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: raphael
      MINIO_ROOT_PASSWORD: raphaeldev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  raphael-core:
    build:
      context: ..
      dockerfile: raphael-infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: raphael-core
        SERVICE_PORT: 8080
        SERVICE_MODULE: raphael_core.app:app
    ports:
      - "8080:8080"
    env_file: services.env.example
    environment:
      RAPHAEL_IDENTITY_URL: http://raphael-identity:8081
      RAPHAEL_WORKSPACES_URL: http://raphael-workspaces:8083
      RAPHAEL_REVIEWS_URL: http://raphael-reviews:8087
      RAPHAEL_AUTOMATION_URL: http://raphael-automation:8095
      RAPHAEL_CONNECTORS_URL: http://raphael-connectors:8096
      RAPHAEL_NOTIFICATIONS_URL: http://raphael-notifications:8090
      RAPHAEL_AUDIT_URL: http://raphael-audit:8093
      RAPHAEL_GRAPH_URL: http://raphael-graph:8100
      RAPHAEL_ORGS_URL: http://raphael-orgs:8082
      RAPHAEL_SYNC_URL: http://raphael-sync:8098
      RAPHAEL_OPS_URL: http://raphael-ops:8103
      RAPHAEL_RWU_URL: http://raphael-rwu:8101
      RAPHAEL_JWT_SECRET: dev-secret-with-32-byte-minimum-length!!
    depends_on:
      - raphael-identity
      - raphael-workspaces
      - raphael-reviews
      - raphael-notifications

  raphael-identity:
    build:
      context: ..
      dockerfile: raphael-infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: raphael-identity
        SERVICE_PORT: 8081
        SERVICE_MODULE: raphael_identity.app:app
    ports:
      - "8081:8081"
    environment:
      RAPHAEL_JWT_SECRET: dev-secret-with-32-byte-minimum-length!!
      RAPHAEL_DATABASE_URL: postgresql://raphael:raphael@postgres:5432/raphael

  raphael-workspaces:
    build:
      context: ..
      dockerfile: raphael-infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: raphael-workspaces
        SERVICE_PORT: 8083
        SERVICE_MODULE: raphael_workspaces.app:app
    ports:
      - "8083:8083"

  raphael-reviews:
    build:
      context: ..
      dockerfile: raphael-infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: raphael-reviews
        SERVICE_PORT: 8087
        SERVICE_MODULE: raphael_reviews.app:app
    ports:
      - "8087:8087"
    environment:
      RAPHAEL_KAFKA_BROKERS: redpanda:9092
      RAPHAEL_NOTIFICATIONS_URL: http://raphael-notifications:8090
      RAPHAEL_WORKSPACES_URL: http://raphael-workspaces:8083

  raphael-automation:
    build:
      context: ..
      dockerfile: raphael-infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: raphael-automation
        SERVICE_PORT: 8095
        SERVICE_MODULE: raphael_automation.app:app
    ports:
      - "8095:8095"

  raphael-connectors:
    build:
      context: ..
      dockerfile: raphael-infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: raphael-connectors
        SERVICE_PORT: 8096
        SERVICE_MODULE: raphael_connectors.app:app
    ports:
      - "8096:8096"

  raphael-notifications:
    build:
      context: ..
      dockerfile: raphael-infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: raphael-notifications
        SERVICE_PORT: 8090
        SERVICE_MODULE: raphael_notifications.app:app
    ports:
      - "8090:8090"
    environment:
      RAPHAEL_KAFKA_BROKERS: redpanda:9092
      RAPHAEL_NOTIFICATIONS_POSTMARK_TOKEN: ${RAPHAEL_NOTIFICATIONS_POSTMARK_TOKEN:-}
      RAPHAEL_NOTIFICATIONS_FROM_EMAIL: notifications@raphael.app

  raphael-audit:
    build:
      context: ..
      dockerfile: raphael-infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: raphael-audit
        SERVICE_PORT: 8093
        SERVICE_MODULE: raphael_audit.app:app
    ports:
      - "8093:8093"

  raphael-graph:
    build:
      context: ..
      dockerfile: raphael-infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: raphael-graph
        SERVICE_PORT: 8100
        SERVICE_MODULE: raphael_graph.app:app
    ports:
      - "8100:8100"

  raphael-orgs:
    build:
      context: ..
      dockerfile: raphael-infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: raphael-orgs
        SERVICE_PORT: 8082
        SERVICE_MODULE: raphael_orgs.app:app
    ports:
      - "8082:8082"
    environment:
      RAPHAEL_NOTIFICATIONS_URL: http://raphael-notifications:8090

  raphael-sync:
    build:
      context: ..
      dockerfile: raphael-infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: raphael-sync
        SERVICE_PORT: 8098
        SERVICE_MODULE: raphael_sync.app:app
    ports:
      - "8098:8098"

  raphael-ops:
    build:
      context: ..
      dockerfile: raphael-infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: raphael-ops
        SERVICE_PORT: 8103
        SERVICE_MODULE: raphael_ops.app:app
    ports:
      - "8103:8103"

  raphael-rwu:
    build:
      context: ..
      dockerfile: raphael-infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: raphael-rwu
        SERVICE_PORT: 8101
        SERVICE_MODULE: raphael_rwu.app:app
    ports:
      - "8101:8101"

  raphael-ui:
    build:
      context: ../raphael-ui
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - raphael-core

volumes:
  pgdata:
  miniodata:
