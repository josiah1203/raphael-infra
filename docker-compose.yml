x-raphael-healthcheck: &raphael-healthcheck
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 25s

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: raphael
      POSTGRES_PASSWORD: raphael
      POSTGRES_DB: raphael
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raphael"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ..
      dockerfile: raphael-infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: raphael-contracts
        SERVICE_PORT: 8099
        SERVICE_MODULE: raphael_contracts.db:run_migrations
    environment:
      RAPHAEL_DATABASE_URL: postgresql://raphael:raphael@postgres:5432/raphael
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    entrypoint: ["python", "-c", "from raphael_contracts.db import run_migrations; run_migrations(); print('migrations complete')"]

  redpanda:
    image: redpandadata/redpanda:v24.2.4
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: raphael
      MINIO_ROOT_PASSWORD: raphaeldev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2024-09-16T17-43-14Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 raphael raphaeldev
        mc mb --ignore-existing local/raphael-artifacts
        mc mb --ignore-existing local/raphael-backups
    restart: "no"

  raphael-core:
    build:
      context: ..
      dockerfile: raphael-infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: raphael-core
        SERVICE_PORT: 8080
        SERVICE_MODULE: raphael_core.app:app
    ports:
      - "8080:8080"
    env_file: services.env.example
    environment:
      RAPHAEL_IDENTITY_URL: http://raphael-identity:8081
      RAPHAEL_WORKSPACES_URL: http://raphael-workspaces:8083
      RAPHAEL_REVIEWS_URL: http://raphael-reviews:8087
      RAPHAEL_AUTOMATION_URL: http://raphael-automation:8095
      RAPHAEL_CONNECTORS_URL: http://raphael-connectors:8096
      RAPHAEL_NOTIFICATIONS_URL: http://raphael-notifications:8090
      RAPHAEL_AUDIT_URL: http://raphael-audit:8093
      RAPHAEL_GRAPH_URL: http://raphael-graph:8100
      RAPHAEL_AI_URL: http://raphael-ai:8104
      RAPHAEL_ADMIN_URL: http://raphael-admin:8106
      RAPHAEL_ARTIFACTS_URL: http://raphael-artifacts:8107
      RAPHAEL_ORGS_URL: http://raphael-orgs:8082
      RAPHAEL_SYNC_URL: http://raphael-sync:8098
      RAPHAEL_OPS_URL: http://raphael-ops:8103
      RAPHAEL_RWU_URL: http://raphael-rwu:8101
      RAPHAEL_COMMENTS_URL: http://raphael-comments:8088
      RAPHAEL_MESSAGING_URL: http://raphael-messaging:8089
      RAPHAEL_LINKS_URL: http://raphael-links:8091
      RAPHAEL_REGISTRY_URL: http://raphael-registry:8097
      RAPHAEL_ENVIRONMENTS_URL: http://raphael-environments:8102
      RAPHAEL_ANALYTICS_URL: http://raphael-analytics:8105
      RAPHAEL_JWT_SECRET: dev-secret-with-32-byte-minimum-length!!
      RAPHAEL_PUBLIC_API_BASE: http://localhost:5173
      RAPHAEL_LOG_FORMAT: json
    healthcheck:
      <<: *raphael-healthcheck
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')\""]
    depends_on:
      raphael-identity:
        condition: service_healthy
      raphael-workspaces:
        condition: service_healthy
      raphael-audit:
        condition: service_healthy
      raphael-orgs:
        condition: service_healthy
      raphael-reviews:
        condition: service_started
      raphael-notifications:
        condition: service_started
      raphael-ai:
        condition: service_healthy
      raphael-automation:
        condition: service_healthy

  raphael-identity:
    build:
      context: ..
      dockerfile: raphael-infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: raphael-identity
        SERVICE_PORT: 8081
        SERVICE_MODULE: raphael_identity.app:app
    ports:
      - "8081:8081"
    environment:
      RAPHAEL_JWT_SECRET: dev-secret-with-32-byte-minimum-length!!
      RAPHAEL_DATABASE_URL: postgresql://raphael:raphael@postgres:5432/raphael
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      <<: *raphael-healthcheck
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/health')\""]

  raphael-audit:
