        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  raphael-ui:
    build:
      context: ..
      dockerfile: raphael-ui/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - raphael-core

volumes:
  pgdata:
  miniodata:
  ollamadata:
