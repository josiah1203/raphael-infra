      RAPHAEL_DATABASE_URL: postgresql://raphael:raphael@postgres:5432/raphael
      RAPHAEL_MINIO_ENDPOINT: minio:9000
      RAPHAEL_MINIO_ACCESS_KEY: raphael
      RAPHAEL_MINIO_SECRET_KEY: raphaeldev
      RAPHAEL_MINIO_BUCKET: raphael-artifacts
      RAPHAEL_MINIO_SECURE: "false"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  raphael-orgs:
