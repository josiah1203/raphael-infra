      RAPHAEL_NOTIFICATIONS_POSTMARK_TOKEN: ${RAPHAEL_NOTIFICATIONS_POSTMARK_TOKEN:-}
      RAPHAEL_NOTIFICATIONS_FROM_EMAIL: notifications@raphael.app
      RAPHAEL_DATABASE_URL: postgresql://raphael:raphael@postgres:5432/raphael
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  raphael-graph:
    build:
      context: ..
      dockerfile: raphael-infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: raphael-graph
        SERVICE_PORT: 8100
        SERVICE_MODULE: raphael_graph.app:app
    ports:
      - "8100:8100"
    environment:
      RAPHAEL_DATABASE_URL: postgresql://raphael:raphael@postgres:5432/raphael
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  raphael-ai:
    build:
      context: ..
      dockerfile: raphael-infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: raphael-ai
        SERVICE_PORT: 8104
        SERVICE_MODULE: raphael_ai.app:app
    ports:
      - "8104:8104"
    environment:
      RAPHAEL_MODEL_BACKEND: ollama
      RAPHAEL_OLLAMA_URL: http://ollama:11434
      RAPHAEL_GEMMA_MODEL: gemma2:2b
      RAPHAEL_MODEL_STARTUP_WAIT_SEC: "300"
      RAPHAEL_DATABASE_URL: postgresql://raphael:raphael@postgres:5432/raphael
      RAPHAEL_AUDIT_URL: http://raphael-audit:8093
      RAPHAEL_WORKSPACES_URL: http://raphael-workspaces:8083
      RAPHAEL_GRAPH_URL: http://raphael-graph:8100
      RAPHAEL_REVIEWS_URL: http://raphael-reviews:8087
      RAPHAEL_ARTIFACTS_URL: http://raphael-artifacts:8107
      RAPHAEL_KAFKA_BROKERS: redpanda:9092
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      ollama-init:
        condition: service_completed_successfully
      ollama:
        condition: service_healthy
    healthcheck:
      <<: *raphael-healthcheck
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8104/health')\""]

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list 2>/dev/null | grep -q 'gemma2:2b'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until ollama list >/dev/null 2>&1; do sleep 2; done
        ollama pull gemma2:2b
    environment:
      OLLAMA_HOST: http://ollama:11434
    restart: "no"

  raphael-admin:
